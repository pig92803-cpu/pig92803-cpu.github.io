<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>部首汽車跑酷</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

        :root {
            --grass-color: #4ade80; 
            --road-color: #334155; 
            --lane-line: #facc15; 
            --text-color: #0f172a;
            --accent-color: #3b82f6; 
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--road-color);
            font-family: 'Nunito', sans-serif;
            overflow: hidden; 
            touch-action: none; 
            color: var(--text-color);
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            z-index: 10;
            pointer-events: none;
            gap: 0.5rem; /* 增加間距以免擁擠 */
        }

        .score-box {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            font-weight: bold;
            font-size: 1.1rem; /* 稍微縮小字體以適應三個框 */
            border: 2px solid var(--accent-color);
            text-align: center;
            flex: 1; /* 讓三個框均分空間 */
        }

        #question-area {
            position: absolute;
            top: 5rem;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        #question-text {
            display: inline-block;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 0.5rem 1.5rem;
            border-radius: 1rem;
            font-size: 1.5rem;
            font-weight: 900;
            color: #ea580c; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            border: 3px solid #fdba74;
            max-width: 90%;
            word-wrap: break-word;
        }

        .menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        .menu-card {
            background-color: white;
            padding: 2rem;
            border-radius: 1.5rem;
            text-align: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            border: 4px solid var(--accent-color);
            max-width: 90%;
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 9999px;
            cursor: pointer;
            margin-top: 1rem;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.5);
        }

        .btn:hover {
            background-color: #2563eb;
        }

        .btn:active {
            transform: scale(0.95);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .feedback-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5rem;
            font-weight: 900;
            z-index: 15;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s, transform 0.5s;
            text-align: center;
            width: 100%;
        }

        .feedback-correct {
            color: #10b981;
            text-shadow: 3px 3px 0 #fff, -3px -3px 0 #fff, 3px -3px 0 #fff, -3px 3px 0 #fff;
        }

        .feedback-wrong {
            color: #ef4444;
            text-shadow: 3px 3px 0 #fff, -3px -3px 0 #fff, 3px -3px 0 #fff, -3px 3px 0 #fff;
        }

        .show-feedback {
            opacity: 1;
            transform: translate(-50%, -100%);
        }
    </style>
</head>
<body>

    <div id="game-container">
        
        <!-- UI 層 -->
        <div id="ui-layer">
            <div class="score-box" style="border-color: #3b82f6; color: #3b82f6;">得分: <br><span id="score">0</span></div>
            <div class="score-box" style="border-color: #10b981; color: #10b981;">答對: <br><span id="correct-count">0</span></div>
            <div class="score-box" style="border-color: #ef4444; color: #ef4444;">生命: <br><span id="lives">❤️❤️❤️</span></div>
        </div>

        <!-- 題目區域 -->
        <div id="question-area">
            <div id="question-text" class="hidden">準備中...</div>
        </div>

        <!-- 遊戲畫布 -->
        <canvas id="gameCanvas"></canvas>

        <!-- 答題回饋 -->
        <div id="feedback-correct" class="feedback-text feedback-correct">答對了! 🌟</div>
        <div id="feedback-wrong" class="feedback-text feedback-wrong">哎呀! 💥</div>

        <!-- 開始選單 -->
        <div id="start-menu" class="menu-overlay">
            <div class="menu-card">
                <h1 class="text-4xl font-black mb-4 text-blue-600">部首汽車跑酷</h1>
                <p class="text-xl mb-4">駕駛紅色汽車，尋找正確部首的國字！</p>
                <div class="text-md text-gray-700 mb-6 text-left inline-block bg-blue-50 p-4 rounded-xl border border-blue-100">
                    <p class="font-bold mb-2">🚗 玩法介紹：</p>
                    <ul class="list-disc pl-5 space-y-1">
                        <li>看上方題目，尋找指定<strong>部首</strong>的字。</li>
                        <li>點擊螢幕左/右半邊，或<strong>左右滑動 (Swipe)</strong> 切換車道。</li>
                        <li>撞到正確的字得分，車速變快！</li>
                        <li>撞到錯誤的字會扣除生命。</li>
                        <li>途中可以吃 🪙 <strong>金幣</strong>加分，或吃 💖 <strong>愛心</strong>補血！</li>
                    </ul>
                </div><br>
                <button class="btn" onclick="startGame()">出發！ ▶️</button>
            </div>
        </div>

        <!-- 遊戲結束選單 -->
        <div id="game-over-menu" class="menu-overlay hidden">
            <div class="menu-card">
                <h1 class="text-4xl font-black mb-4 text-red-500">遊戲結束</h1>
                <p class="text-2xl mb-2 text-blue-600">總得分: <span id="final-score" class="font-bold">0</span></p>
                <p class="text-2xl mb-6 text-green-600">答對題數: <span id="final-correct" class="font-bold">0</span> 題</p>
                <button class="btn" onclick="resetGame()">再玩一次 🔄</button>
            </div>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ==== 將使用者上傳的汽車圖案轉為 SVG 向量圖直接內嵌 ====
        const carSvgCode = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
          <!-- 輪胎 -->
          <path d="M 35 150 L 55 150 L 55 180 L 35 180 Z" fill="#222"/>
          <path d="M 145 150 L 165 150 L 165 180 L 145 180 Z" fill="#222"/>
          
          <!-- 後照鏡 -->
          <path d="M 15 85 C 10 85 10 95 15 100 L 30 100 L 35 85 Z" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
          <path d="M 185 85 C 190 85 190 95 185 100 L 170 100 L 165 85 Z" fill="#e0e0e0" stroke="#333" stroke-width="2"/>

          <!-- 紅色車身主體 -->
          <path d="M 45 40 L 155 40 L 165 80 L 185 100 L 185 150 C 185 160 175 165 165 165 L 35 165 C 25 165 15 160 15 150 L 15 100 L 35 80 Z" fill="#ff0000"/>
          
          <!-- 深灰後擋風玻璃 -->
          <path d="M 55 45 L 145 45 L 155 75 L 45 75 Z" fill="#4d4d4d" stroke="#333" stroke-width="4"/>
          
          <!-- 左右紅色車燈與中間連結 -->
          <path d="M 20 95 L 65 95 L 70 115 L 20 110 Z" fill="#cc1414" stroke="#8a1414" stroke-width="2"/>
          <path d="M 180 95 L 135 95 L 130 115 L 180 110 Z" fill="#cc1414" stroke="#8a1414" stroke-width="2"/>
          <rect x="65" y="100" width="70" height="10" fill="#a01d1d"/>

          <!-- 黑色下保險桿 -->
          <path d="M 20 140 L 180 140 L 175 165 L 25 165 Z" fill="#2c2c2c"/>

          <!-- 銀色排氣管 -->
          <circle cx="50" cy="152" r="9" fill="#cccccc" stroke="#666" stroke-width="2"/>
          <circle cx="150" cy="152" r="9" fill="#cccccc" stroke="#666" stroke-width="2"/>

          <!-- 黑色小反光片 -->
          <rect x="30" y="125" width="15" height="4" fill="#000"/>
          <rect x="155" y="125" width="15" height="4" fill="#000"/>
        </svg>
        `;
        const carImage = new Image();
        carImage.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(carSvgCode);

        // UI 元素
        const scoreEl = document.getElementById('score');
        const correctCountEl = document.getElementById('correct-count'); // 新增答對題數元素
        const livesEl = document.getElementById('lives');
        const questionTextEl = document.getElementById('question-text');
        const startMenu = document.getElementById('start-menu');
        const gameOverMenu = document.getElementById('game-over-menu');
        const finalScoreEl = document.getElementById('final-score');
        const finalCorrectEl = document.getElementById('final-correct'); // 新增結算答對題數元素
        const feedbackCorrect = document.getElementById('feedback-correct');
        const feedbackWrong = document.getElementById('feedback-wrong');

        // 遊戲設定
        let canvasWidth, canvasHeight;
        const laneCount = 3;
        let laneWidth;
        const baseSpeed = 2.5; // 速度調慢
        let currentSpeed = baseSpeed;
        const speedIncrement = 0.25; 
        const maxSpeed = 12; // 最高速度

        // 物理距離設定 (取代原本不穩定的 frameCount 產生方式)
        let traveledDistance = 0;       // 車輛總行駛距離
        let nextWordSpawn = 0;          // 下一次出現國字的距離點
        let nextItemSpawn = 0;          // 下一次出現道具的距離點
        const WORD_GAP = 600;           // 國字與國字之間的固定物理距離 (Pixels)

        // 部首題庫設定
        const radicalDict = {
            "金": ["錢", "鐵", "銅", "銀", "鐘", "針", "釘"],
            "木": ["樹", "林", "森", "椅", "桌", "枝", "根"],
            "水": ["河", "海", "泳", "汗", "汁", "洗", "泡"], 
            "火": ["烤", "燒", "燈", "煙", "炒", "炎", "災"], 
            "土": ["地", "坡", "城", "堆", "塔", "塊", "塵"],
            "手": ["打", "拍", "抓", "提", "握", "推", "拉"], 
            "目": ["眼", "睛", "睡", "瞪", "看", "眉", "盼"],
            "足": ["跑", "跳", "踢", "踏", "踩", "跨", "跌"], 
            "女": ["媽", "妹", "姐", "奶", "她", "娘", "姑"],
            "日": ["明", "晴", "早", "晚", "時", "星", "春"],
            "月": ["期", "朗", "朋", "服", "朔", "望", "朝"],
            "肉": ["肚", "胖", "肥", "腿", "臉", "胃", "背"], 
            "口": ["吃", "喝", "唱", "叫", "嘴", "吹", "咬"]
        };
        const radicals = Object.keys(radicalDict);

        // 遊戲狀態
        let gameState = 'START'; 
        let score = 0;
        let correctCount = 0; // 新增答對題數變數
        let lives = 3;
        const maxLives = 5;
        let animationId;
        
        let currentQuestion = null;
        let items = []; 
        let floatingTexts = []; 
        let roadScrollOffset = 0; 

        // 汽車設定
        const player = {
            lane: 1, 
            targetLane: 1,
            y: 0, 
            width: 100, // 汽車寬度
            height: 100, // 汽車高度
            moveSpeed: 0.15, // 車道切換的滑順度
            currentX: 0
        };

        function resizeCanvas() {
            canvasWidth = window.innerWidth;
            canvasHeight = window.innerHeight;
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
            
            laneWidth = canvasWidth / laneCount;
            
            player.y = canvasHeight - 140;
            player.currentX = (player.lane * laneWidth) + (laneWidth / 2);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas(); 

        // 處理點擊/觸控輸入 (左/右移動)
        function handleInput(xPos) {
            if (gameState !== 'PLAYING') return;

            if (xPos < canvasWidth / 2) {
                if (player.targetLane > 0) player.targetLane--;
            } else {
                if (player.targetLane < laneCount - 1) player.targetLane++;
            }
        }

        // 滑鼠點擊支援
        canvas.addEventListener('mousedown', (e) => handleInput(e.clientX));

        // 觸控與滑動 (Swipe) 支援 - 大幅提升靈敏度
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            if (gameState === 'PLAYING') {
                e.preventDefault(); // 防止畫面被拖曳滾動
            }
            if(e.touches.length > 0) {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            if (gameState === 'PLAYING') {
                e.preventDefault(); 
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            if (gameState !== 'PLAYING') return;
            
            if(e.changedTouches.length > 0) {
                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;
                
                const dx = touchEndX - touchStartX;
                const dy = touchEndY - touchStartY;

                // 判斷是滑動還是點擊 (設定 30px 的寬容值，只要滑動超過 30 像素即觸發)
                if (Math.abs(dx) > 30 && Math.abs(dx) > Math.abs(dy)) {
                    // 水平滑動 (Swipe)
                    if (dx > 0) {
                        // 往右滑
                        if (player.targetLane < laneCount - 1) player.targetLane++;
                    } else {
                        // 往左滑
                        if (player.targetLane > 0) player.targetLane--;
                    }
                } else if (Math.abs(dx) < 15 && Math.abs(dy) < 15) {
                    // 原地輕點 (Tap) - 支援整個畫面的左右半部
                    handleInput(touchEndX);
                }
            }
        });

        function drawBackground() {
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--road-color');
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);

            roadScrollOffset += currentSpeed;

            ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--lane-line');
            ctx.lineWidth = 6;
            ctx.setLineDash([40, 40]); 
            ctx.lineDashOffset = -roadScrollOffset; 
            
            for (let i = 1; i < laneCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * laneWidth, 0);
                ctx.lineTo(i * laneWidth, canvasHeight);
                ctx.stroke();
            }
            ctx.setLineDash([]); 
        }

        function updatePlayer() {
            const targetX = (player.targetLane * laneWidth) + (laneWidth / 2);
            player.currentX += (targetX - player.currentX) * player.moveSpeed;
            player.lane = player.targetLane; 
        }

        function drawPlayer() {
            const bounce = Math.random() * 1.5; 
            
            if (carImage.complete) {
                ctx.drawImage(
                    carImage, 
                    player.currentX - player.width / 2, 
                    player.y - player.height / 2 + bounce, 
                    player.width, 
                    player.height
                );
            }
        }

        function generateQuestion() {
            const randomIndex = Math.floor(Math.random() * radicals.length);
            currentQuestion = radicals[randomIndex];
            
            questionTextEl.textContent = `請問哪個字的部首是「${currentQuestion}」部？`;
            questionTextEl.classList.remove('hidden');
        }

        class Item {
            constructor(lane, type, isCorrect = false) {
                this.lane = lane;
                this.type = type; 
                this.x = (lane * laneWidth) + (laneWidth / 2);
                this.y = -60; 
                this.isCorrect = isCorrect;
                this.size = 50; 
                
                if (this.type === 'word') {
                    if (this.isCorrect) {
                        const words = radicalDict[currentQuestion];
                        this.word = words[Math.floor(Math.random() * words.length)];
                    } else {
                        let wrongRadical;
                        do {
                            wrongRadical = radicals[Math.floor(Math.random() * radicals.length)];
                        } while (wrongRadical === currentQuestion);
                        const words = radicalDict[wrongRadical];
                        this.word = words[Math.floor(Math.random() * words.length)];
                    }
                    this.bgColor = '#ffffff';
                    this.borderColor = '#64748b'; 
                    this.textColor = '#0f172a'; 
                } else if (this.type === 'coin') {
                    this.emoji = '🪙';
                } else if (this.type === 'health') {
                    this.emoji = '💖';
                }
            }

            update() {
                this.y += currentSpeed;
            }

            draw() {
                if (this.type === 'word') {
                    const radius = 32;
                    ctx.fillStyle = this.bgColor;
                    ctx.strokeStyle = this.borderColor;
                    ctx.lineWidth = 4;
                    
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();

                    ctx.fillStyle = this.textColor;
                    ctx.font = 'bold 32px "標楷體", "Nunito", sans-serif'; 
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.word, this.x, this.y + 2); 
                } else {
                    ctx.font = '45px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.emoji, this.x, this.y);
                }
            }
        }

        function spawnItems() {
            // 利用真實行駛距離來計算生成時間，保持距離永遠固定
            traveledDistance += currentSpeed;

            // 產生國字題目的時機
            if (traveledDistance >= nextWordSpawn) {
                const correctLane = Math.floor(Math.random() * laneCount);
                
                for (let i = 0; i < laneCount; i++) {
                    const isCorrect = (i === correctLane);
                    items.push(new Item(i, 'word', isCorrect));
                }
                
                // 設定下一次國字出現的距離
                nextWordSpawn += WORD_GAP;
            } 
            
            // 產生道具的時機 (剛好設定在國字與國字距離的"中間")
            if (traveledDistance >= nextItemSpawn) {
                if (Math.random() < 0.6) { // 60% 機率出道具
                    const lane = Math.floor(Math.random() * laneCount);
                    let type = 'coin';
                    if (Math.random() < 0.2 && lives < maxLives) {
                        type = 'health';
                    }
                    items.push(new Item(lane, type));
                }
                
                // 設定下一次道具出現的距離
                nextItemSpawn += WORD_GAP;
            }
        }

        function showMiniFeedback(text, x, y, color) {
            floatingTexts.push({ text, x, y, color, life: 40 });
        }

        function drawFloatingTexts() {
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                const ft = floatingTexts[i];
                
                ctx.font = '900 28px Nunito';
                ctx.textAlign = 'center';
                
                ctx.lineWidth = 4;
                ctx.strokeStyle = '#000';
                ctx.strokeText(ft.text, ft.x, ft.y);
                
                ctx.fillStyle = ft.color;
                ctx.fillText(ft.text, ft.x, ft.y);
                
                ft.y -= 2; 
                ft.life--;
                
                if (ft.life <= 0) floatingTexts.splice(i, 1);
            }
        }

        function checkCollisions() {
            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                
                const yOverlap = Math.abs(player.y - item.y) < (player.height/2 + item.size/2 - 15); 
                const xOverlap = player.lane === item.lane;

                if (yOverlap && xOverlap) {
                    if (item.type === 'word') {
                        if (item.isCorrect) {
                            handleCorrectAnswer();
                        } else {
                            handleWrongAnswer();
                        }
                        items = items.filter(it => it.type !== 'word');
                        break; 
                    } else if (item.type === 'coin') {
                        score += 5;
                        scoreEl.textContent = score;
                        showMiniFeedback('+5', item.x, item.y, '#fde047'); 
                        items.splice(i, 1); 
                    } else if (item.type === 'health') {
                        if (lives < maxLives) {
                            lives++;
                            updateLivesDisplay();
                        }
                        showMiniFeedback('+1 ❤️', item.x, item.y, '#ef4444'); 
                        items.splice(i, 1);
                    }
                } else if (item.y > canvasHeight + 60) {
                    items.splice(i, 1);
                }
            }
        }

        function showFeedback(element) {
            element.classList.remove('show-feedback');
            void element.offsetWidth; 
            element.classList.add('show-feedback');
            
            setTimeout(() => {
                element.classList.remove('show-feedback');
            }, 800);
        }

        function updateLivesDisplay() {
            let hearts = '';
            for(let i=0; i<lives; i++) hearts += '❤️';
            for(let i=lives; i<maxLives; i++) hearts += '🖤';
            livesEl.textContent = hearts;
        }

        function handleCorrectAnswer() {
            score += 10;
            scoreEl.textContent = score;
            
            // 增加答對題數並更新 UI
            correctCount++;
            correctCountEl.textContent = correctCount;
            
            if (currentSpeed < maxSpeed) {
                currentSpeed += speedIncrement;
            }
            
            showFeedback(feedbackCorrect);
            generateQuestion();
        }

        function handleWrongAnswer() {
            lives--;
            updateLivesDisplay();
            showFeedback(feedbackWrong);

            if (lives <= 0) {
                endGame();
            } else {
                generateQuestion();
            }
        }

        function gameLoop() {
            if (gameState !== 'PLAYING') return;

            ctx.clearRect(0, 0, canvasWidth, canvasHeight);

            drawBackground();
            updatePlayer();
            drawPlayer();
            spawnItems();

            for (let i = 0; i < items.length; i++) {
                items[i].update();
                items[i].draw();
            }

            checkCollisions();
            drawFloatingTexts();

            animationId = requestAnimationFrame(gameLoop);
        }

        function startGame() {
            startMenu.classList.add('hidden');
            gameOverMenu.classList.add('hidden');
            
            score = 0;
            correctCount = 0; // 重置答對題數
            lives = 3;
            currentSpeed = baseSpeed; 
            items = [];
            floatingTexts = [];
            
            // 初始化行駛距離與第一次產生障礙物的距離點
            traveledDistance = 0;
            roadScrollOffset = 0;
            nextWordSpawn = 50; // 遊戲剛開始 50px 處先產生第一波國字
            nextItemSpawn = nextWordSpawn + (WORD_GAP / 2); // 道具精準定位在國字間距的「正中間」

            player.targetLane = 1;
            player.lane = 1;
            
            scoreEl.textContent = score;
            correctCountEl.textContent = correctCount; // 更新畫面顯示的答對題數
            updateLivesDisplay();
            
            gameState = 'PLAYING';
            generateQuestion();
            
            if (animationId) cancelAnimationFrame(animationId);
            gameLoop();
        }

        function resetGame() {
            startGame();
        }

        function endGame() {
            gameState = 'GAMEOVER';
            cancelAnimationFrame(animationId);
            
            finalScoreEl.textContent = score;
            finalCorrectEl.textContent = correctCount; // 更新結算畫面的答對題數
            
            questionTextEl.classList.add('hidden');
            gameOverMenu.classList.remove('hidden');
        }

    </script>
</body>
</html>
